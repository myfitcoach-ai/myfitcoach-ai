<h2 mat-dialog-title>{{ isEdit ? 'Edit Workout Plan' : 'Create Workout Plan' }}</h2>

<mat-dialog-content class="dialog-content">
  <p class="dialog-subtitle">{{ isEdit ? 'Update the selected workout plan details.' : 'Add a new workout plan to your account.' }}</p>

  <form class="dialog-form" [formGroup]="form" (ngSubmit)="save()">
    <div class="dialog-grid">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" maxlength="100" [disabled]="isSaving" />
        <mat-error *ngIf="shouldShowError('title')">Title is required.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Goal</mat-label>
        <input matInput formControlName="goal" maxlength="100" [disabled]="isSaving" />
        <mat-error *ngIf="shouldShowError('goal')">Goal is required.</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Duration weeks</mat-label>
        <input matInput type="number" min="1" formControlName="durationWeeks" [disabled]="isSaving" />
        <mat-error *ngIf="shouldShowError('durationWeeks')">Enter a valid duration in weeks.</mat-error>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput rows="4" maxlength="500" formControlName="description" [disabled]="isSaving"></textarea>
      <mat-error *ngIf="shouldShowError('description')">Description is required.</mat-error>
    </mat-form-field>

    <mat-dialog-actions align="end" class="dialog-actions">
      <button mat-stroked-button type="button" (click)="close()" [disabled]="isSaving">Cancel</button>
      <button mat-flat-button color="primary" type="submit" [disabled]="isSaving || form.invalid">
        <mat-spinner *ngIf="isSaving" diameter="18"></mat-spinner>
        <mat-icon *ngIf="!isSaving">{{ isEdit ? 'save' : 'playlist_add' }}</mat-icon>
        <span>{{ isEdit ? 'Update Plan' : 'Create Plan' }}</span>
      </button>
    </mat-dialog-actions>
  </form>
</mat-dialog-content>
